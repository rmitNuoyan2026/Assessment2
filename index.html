<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Icon Suite</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="icons">

    <div class="icon-box icon-large">
      <div class="icon-wrapper">
        <img src="img/calendar.svg" class="icon default-icon">
        <img src="img/calendar2.svg" class="icon hover-icon">
      </div>
      <audio src="sound/calender.mp3"></audio>
    </div>

    <div class="icon-box">
      <div class="icon-wrapper">
        <img src="img/book.svg" class="icon default-icon book-default">
        <img src="img/book2.svg" class="icon hover-icon">
      </div>
      <audio src="sound/book.mp3"></audio>
    </div>

    <div class="icon-box icon-large" id="headphone-box">
      <div class="icon-wrapper">
        <img src="img/headphone.svg" class="icon default-icon">
        <img src="img/headphone2.svg" class="icon hover-icon" id="headphone-icon">
      </div>
      <audio src="sound/headphone.mp3"></audio>
    </div>

    <div class="icon-box icon-large">
      <div class="icon-wrapper">
        <img src="img/camera.svg" class="icon default-icon">
        <img src="img/camera2.svg" class="icon hover-icon camera-hover">
      </div>
      <audio src="sound/camera.mp3"></audio>
    </div>

    <div class="icon-box icon-large">
      <div class="icon-wrapper">
        <img src="img/pencil.svg" class="icon default-icon">
        <img src="img/pencil2.svg" class="icon hover-icon">
      </div>
      <audio src="sound/pencil.mp3"></audio>
    </div>

    <div class="icon-box">
      <div class="icon-wrapper">
        <img src="img/list.svg" class="icon default-icon">
        <img src="img/list2.svg" class="icon hover-icon">
      </div>
      <audio src="sound/list.mp3"></audio>
    </div>

    <div class="icon-box icon-large">
      <div class="icon-wrapper">
        <img src="img/photo.svg" class="icon default-icon">
        <img src="img/photo2.svg" class="icon hover-icon">
      </div>
      <audio src="sound/photo.mp3"></audio>
    </div>

    <div class="icon-box">
      <div class="icon-wrapper">
        <img src="img/hourglass.svg" class="icon default-icon">
        <img src="img/hourglass2.svg" class="icon hover-icon">
      </div>
      <audio src="sound/hourglass.mp3"></audio>
    </div>

    <div class="icon-box">
      <div class="icon-wrapper">
        <img src="img/mail.svg" class="icon default-icon">
        <img src="img/mail2.svg" class="icon hover-icon">
      </div>
      <audio src="sound/mail.mp3"></audio>
    </div>

  </div>

  <script>
    document.querySelectorAll('.icon-box').forEach(box => {
      const audio = box.querySelector('audio');
      if (audio) {
        audio.load();
      }
      box.addEventListener('mouseenter', () => {
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(e => console.log(e));
        }
      });
      box.addEventListener('mouseleave', () => {
        if (audio) {
          audio.pause();
          audio.currentTime = 0;
        }
      });
    });

    // 耳机点击震动效果
    const headphoneBox = document.getElementById('headphone-box');
    const headphoneIcon = document.getElementById('headphone-icon');
    headphoneBox.addEventListener('mouseenter', () => {
      headphoneIcon.classList.remove('shake');
      void headphoneIcon.offsetWidth;
      headphoneIcon.classList.add('shake');
    });
  </script>

</body>

</html>
